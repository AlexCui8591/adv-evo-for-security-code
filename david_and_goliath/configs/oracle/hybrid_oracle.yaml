# Hybrid Oracle configuration snippet.
# Can be passed directly with --config to override only oracle defaults.

oracle:
  judge_model: gpt-4o-mini
  api_key: null
  bandit_enabled: true
  semgrep_enabled: false
  semgrep_rules: p/security-audit
  judge_temperature: 0.1
  w_vulnerability: 0.30
  w_manipulation: 0.30
  w_quality: 0.20
  w_diversity: 0.10
  w_stealth: 0.10
  failure_quality_scale: 0.15
