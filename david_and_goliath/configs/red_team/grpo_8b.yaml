# Red Team GRPO configuration snippet for Llama 3.1 8B + existing LoRA.
# This file uses the nested schema expected by run_coevolution.py.

red_team:
  model_name: unsloth/Llama-3.1-8B-Instruct
  lora_path: /ocean/projects/cis250260p/cuiz/11766-project/adv-evo-for-security-code/david_and_goliath/final_adapter
  prompt_builder:
    n_parents: 2
    n_inspirations: 3
    max_payload_chars: 500
  cluster:
    num_training_gpus: 2
    num_inference_gpus: 4
    tensor_parallel_size: 2
    num_reward_workers: 4
  deepspeed:
    zero_stage: 3
    offload_optimizer: false
    offload_param: false
  vllm:
    gpu_memory_utilization: 0.90
    max_model_len: 2048
    enforce_eager: false
  grpo:
    group_size: 8
    eps: 1.0e-8
    kl_coeff: 0.01
    clip_eps: 0.2
    max_gen_length: 512
    temperature: 0.9
    top_p: 0.95
    learning_rate: 5.0e-6
    prompts_per_round: 32
    top_k_save: 10
  lora:
    r: 64
    alpha: 128
    dropout: 0.05
  wandb:
    enabled: false
    project: david-and-goliath
    run_name: red-grpo-llama31-8b-lora
    tags: [red-team, grpo, llama-3.1-8b, lora]
