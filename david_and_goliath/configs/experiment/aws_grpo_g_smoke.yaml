experiment_id: aws_grpo_g_smoke
output_dir: outputs/aws_grpo_g_smoke
seed: 42
total_rounds: 1
coding_tasks_path: david_and_goliath/data/coding_tasks/tasks.jsonl

stage1:
  # G-series smoke test: validate veRL wiring, not final model quality.
  num_prompts: 8
  val_num_prompts: 2
  task_description_max_chars: 800
  disable_qwen_thinking: true
  reward_mode: rule
  reward_fail_fast: false
  blue_behavior_summary: "G-series smoke test: no live Blue Team feedback is available yet."
  carriers:
    - NATURAL_LANGUAGE
    - CODE_COMMENT

oracle:
  # Used only when stage1.reward_mode is judge_c or hybrid.
  judge_model: gpt-4o-mini
  api_key: null
  judge_temperature: 0.1
  w_quality: 0.50
  w_stealth: 0.30
  w_creativity: 0.20

red_team:
  prompt_builder:
    n_parents: 0
    n_inspirations: 0
    max_payload_chars: 500

verl:
  command_module: verl.trainer.main_ppo
  model_path: Qwen/Qwen2.5-0.5B-Instruct
  trust_remote_code: true
  reward_manager: naive

  model:
    use_remove_padding: true

  data:
    max_prompt_length: 512
    max_response_length: 128
    train_batch_size: 2
    shuffle: true
    filter_overlong_prompts: true
    truncation: left
    trust_remote_code: true

  actor:
    lr: 1e-6
    ppo_mini_batch_size: 2
    micro_batch_size_per_gpu: 1
    gradient_checkpointing: true
    use_kl_loss: true
    kl_loss_coef: 0.001
    kl_loss_type: low_var_kl
    clip_ratio: 0.2
    ppo_epochs: 1
    param_offload: true
    optimizer_offload: true

  ref:
    log_prob_micro_batch_size_per_gpu: 1
    param_offload: true

  rollout:
    name: vllm
    n: 2
    temperature: 1.0
    top_p: 0.95
    tensor_model_parallel_size: 1
    gpu_memory_utilization: 0.30
    max_num_batched_tokens: 1024
    log_prob_micro_batch_size_per_gpu: 1

  trainer:
    project_name: david_and_goliath
    logger:
      - console
    nnodes: 1
    n_gpus_per_node: 1
    total_epochs: 1
    save_freq: 1
    test_freq: -1
    val_before_train: false

runtime:
  HYDRA_FULL_ERROR: "1"
  TOKENIZERS_PARALLELISM: "false"
  VLLM_USE_V1: "1"
  VLLM_ALLOW_INSECURE_SERIALIZATION: "1"
  CUDA_DEVICE_MAX_CONNECTIONS: "1"
  RAY_EXPERIMENTAL_NOSET_CUDA_VISIBLE_DEVICES: "1"
