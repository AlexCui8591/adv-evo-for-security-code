experiment_id: verl_grpo_8b
output_dir: outputs/verl_grpo_8b
seed: 42
total_rounds: 1
coding_tasks_path: david_and_goliath/data/coding_tasks/tasks.jsonl

stage1:
  num_prompts: 512
  val_num_prompts: 64
  disable_qwen_thinking: true
  reward_fail_fast: true
  blue_behavior_summary: "Offline Stage-1: no live Blue Team feedback is available yet."
  carriers:
    - NATURAL_LANGUAGE
    - CODE_COMMENT
    - DOCSTRING
    - MARKDOWN

oracle:
  judge_model: gpt-4o-mini
  api_key: null
  judge_temperature: 0.1
  w_quality: 0.50
  w_stealth: 0.30
  w_creativity: 0.20

red_team:
  prompt_builder:
    n_parents: 0
    n_inspirations: 0
    max_payload_chars: 800

verl:
  command_module: verl.trainer.main_ppo
  model_path: Qwen/Qwen3-8B
  trust_remote_code: true
  reward_manager: naive

  data:
    max_prompt_length: 2048
    max_response_length: 512
    train_batch_size: 64
    shuffle: true
    truncation: left
    trust_remote_code: true

  actor:
    lr: 5e-6
    ppo_mini_batch_size: 32
    micro_batch_size_per_gpu: 1
    gradient_checkpointing: true
    use_kl_loss: true
    kl_loss_coef: 0.001
    kl_loss_type: low_var_kl
    clip_ratio: 0.2
    ppo_epochs: 1
    param_offload: false
    optimizer_offload: false

  ref:
    log_prob_micro_batch_size_per_gpu: 1
    param_offload: true

  rollout:
    name: vllm
    n: 8
    temperature: 1.0
    top_p: 0.95
    tensor_model_parallel_size: 1
    gpu_memory_utilization: 0.55
    max_num_batched_tokens: 8192
    log_prob_micro_batch_size_per_gpu: 1

  trainer:
    project_name: david_and_goliath
    logger:
      - console
    nnodes: 1
    n_gpus_per_node: 4
    total_epochs: 1
    save_freq: 10
    test_freq: -1
    val_before_train: false
