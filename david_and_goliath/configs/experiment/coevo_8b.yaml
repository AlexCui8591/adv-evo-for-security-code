# Main 8B Red Team + local 72B Blue Team experiment.
# Blue Team is local 72B inference through an OpenAI-compatible vLLM/Ray endpoint.
# Expected Red Team resources: 12 H100 GPUs. Blue Team GPUs are allocated separately.

experiment_id: coevo_8b_local_blue_72b
seed: 42
resume: false
total_rounds: 20
checkpoint_every: 5
output_dir: outputs/coevo_8b_local_blue_72b
coding_tasks_path: david_and_goliath/data/coding_tasks/tasks.jsonl
niche_capacity: 5

oracle:
  judge_model: us.anthropic.claude-sonnet-4-6
  api_key: null
  base_url: https://ai-gateway.andrew.cmu.edu
  bandit_enabled: true
  semgrep_enabled: false
  semgrep_rules: p/security-audit
  judge_temperature: 0.1
  w_vulnerability: 0.30
  w_manipulation: 0.30
  w_quality: 0.20
  w_diversity: 0.10
  w_stealth: 0.10
  failure_quality_scale: 0.15

blue_team:
  model: Qwen/Qwen2.5-Coder-32B-Instruct
  api_key: EMPTY
  base_url: http://127.0.0.1:8000/v1
  temperature: 0.2
  max_turns: 6
  max_reflexion: 2

red_team:
  model_name: unsloth/Llama-3.1-8B-Instruct
  lora_path: /ocean/projects/cis250260p/cuiz/11766-project/adv-evo-for-security-code/david_and_goliath/final_adapter
  prompt_builder:
    n_parents: 2
    n_inspirations: 3
    max_payload_chars: 500
  cluster:
    num_training_gpus: 4
    num_inference_gpus: 8
    tensor_parallel_size: 1
    num_reward_workers: 8
  deepspeed:
    zero_stage: 3
    offload_optimizer: false
    offload_param: false
  vllm:
    gpu_memory_utilization: 0.90
    max_model_len: 2048
    enforce_eager: false
  grpo:
    group_size: 8
    eps: 1.0e-8
    kl_coeff: 0.01
    clip_eps: 0.2
    max_gen_length: 512
    temperature: 0.9
    top_p: 0.95
    learning_rate: 5.0e-6
    prompts_per_round: 32
    top_k_save: 10
  lora:
    r: 16
    alpha: 32
    dropout: 0.05
  wandb:
    enabled: false
    project: david-and-goliath
    run_name: coevo-8b-local-blue-72b
    tags: [coevo, local-blue, qwen2.5-coder-32b, qwen2.5-7b, lora-grpo]
